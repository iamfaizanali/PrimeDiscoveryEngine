version: '3.8'

services:
  prime-discovery:
    build: .
    container_name: prime-discovery-engine
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - ENGINE_MAX_HYPOTHESES=1000
      - DATASET_MAX_PRIME=1000000
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: PostgreSQL for storing results
  db:
    image: postgres:15-alpine
    container_name: prime-discovery-db
    environment:
      - POSTGRES_USER=prime_discovery
      - POSTGRES_PASSWORD=discovery123
      - POSTGRES_DB=prime_engine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prime_discovery"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
